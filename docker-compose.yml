services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: sqlite:////app/data/ticketing.db
      UPLOAD_DIR: /app/uploads
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_USE_TLS: "false"
      FRONTEND_URL: https://localhost
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads
    expose:
      - "8000"
    depends_on:
      - mailhog

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    command: ["nginx", "-g", "daemon off;", "-c", "/etc/nginx/nginx.conf"]
    depends_on:
      - backend
      - frontend

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "8025:8025"
    expose:
      - "1025"

volumes:
  backend_data:
  backend_uploads:
