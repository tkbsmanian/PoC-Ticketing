# fly.toml app configuration file generated for ticketing-backend on 2026-04-29T06:22:16-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ticketing-backend'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  APP_ENV = 'production'
  DATABASE_URL = 'sqlite:////data/ticketing.db'
  LOG_FORMAT = 'json'
  LOG_LEVEL = 'INFO'
  SMTP_FROM_ADDRESS = 'noreply@ticketing.local'
  SMTP_HOST = ''
  SMTP_PORT = '587'
  SMTP_USE_TLS = 'false'
  SYNC_ADAPTER = 'mock'
  UPLOAD_DIR = '/data/uploads'

[[mounts]]
  source = 'ticketing_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
