app = "ticketing-backend"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  DATABASE_URL = "sqlite:////data/ticketing.db"
  UPLOAD_DIR = "/data/uploads"
  SYNC_ADAPTER = "mock"
  LOG_FORMAT = "json"
  LOG_LEVEL = "INFO"
  SMTP_HOST = ""
  SMTP_PORT = "587"
  SMTP_USE_TLS = "false"
  SMTP_FROM_ADDRESS = "noreply@ticketing.local"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[mounts]]
  source = "ticketing_data"
  destination = "/data"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
