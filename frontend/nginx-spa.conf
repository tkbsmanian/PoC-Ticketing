resolver 8.8.8.8 valid=30s;

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend on Fly
    location /api/ {
        set $backend "https://ticketing-backend.fly.dev";
        proxy_pass $backend/;
        proxy_ssl_server_name on;

        # Pass all headers
        proxy_set_header Host ticketing-backend.fly.dev;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Cookie $http_cookie;

        # Pass cookies back from backend to browser
        proxy_pass_header Set-Cookie;

        proxy_read_timeout 60s;
        client_max_body_size 11M;
    }

    # React SPA — all other routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
